# ============================================================
# SERVER
# ============================================================
server.port=8008
server.ssl.enabled=true

# SSL keystore (FROM RESOURCES)
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=StrongPass123!
server.ssl.key-alias=aqark-api

# ============================================================
# DATABASE (SQL Server)
# ============================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=AQARK_RENT_MANAGEMENT;encrypt=true;trustServerCertificate=true
spring.datasource.username=app_root
spring.datasource.password=app_root
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# Disable SQL logs in production (enable only in dev)
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=INFO

# ============================================================
# OAUTH2 RESOURCE SERVER (JWT via SAS)
# ============================================================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://localhost:9443/oauth2/jwks

# ============================================================
# SECURITY - CUSTOM CONFIG
# ============================================================

# ---- SAS Base URL (used by WebClient)
app.security.sas.base-url=https://localhost:9443

# ---- JWT Cookie Name
app.security.cookie.token-name=SAS_TOKEN

# ============================================================
# CORS CONFIGURATION (ENTERPRISE SAFE)
# ============================================================

app.security.cors.allowed-origins=http://localhost:4200
app.security.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.security.cors.allowed-headers=Authorization,Content-Type,X-Requested-With
app.security.cors.allow-credentials=true
app.security.cors.max-age=3600


# ============================================================
# FILE UPLOAD CONFIG
# ============================================================

upload.directory=C:\\MyApps\\AQARK_RENT_MANAGEMENT\\Uploads

folder.buildings=buildings
folder.building=building
folder.rooms=room
folder.flat=flat
folder.home=home

flat.link.src=https://localhost:8008/api/images/flat/
building.link.src=https://localhost:8008/api/images/buildings/
room.link.src=https://localhost:8008/api/images/room/

